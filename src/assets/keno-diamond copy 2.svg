<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Fast-optimized gradient definitions -->
    <linearGradient id="gemFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gemHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="gemGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main gem body (octagon shape) -->
  <polygon points="25,10 75,10 90,25 90,75 75,90 25,90 10,75 10,25" fill="url(#gemFace)" stroke="#15803d" stroke-width="0.5"/>
  
  <!-- Top facet -->
  <polygon points="25,10 75,10 65,25 35,25" fill="#86efac" opacity="0.9"/>
  
  <!-- Bottom facet -->
  <polygon points="35,75 65,75 75,90 25,90" fill="#15803d" opacity="0.8"/>
  
  <!-- Left facets -->
  <polygon points="10,25 25,10 35,25 35,75 25,90 10,75" fill="url(#edgeLight)" opacity="0.6"/>
  
  <!-- Right facets -->
  <polygon points="90,25 75,10 65,25 65,75 75,90 90,75" fill="#22c55e" opacity="0.7"/>
  
  <!-- Center highlight for 3D effect -->
  <polygon points="35,25 65,25 65,75 35,75" fill="url(#gemHighlight)" opacity="0.4"/>
  
  <!-- Bright edges -->
  <polygon points="25,10 75,10 65,25 35,25" fill="none" stroke="#bbf7d0" stroke-width="0.8" opacity="0.9"/>
  <polygon points="35,25 65,25 65,75 35,75" fill="none" stroke="#86efac" stroke-width="0.5" opacity="0.6"/>
  <polygon points="35,75 65,75 75,90 25,90" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Outer glow effect -->
  <polygon points="25,10 75,10 90,25 90,75 75,90 25,90 10,75 10,25" fill="none" stroke="#4ade80" stroke-width="0.3" opacity="0.3" filter="url(#gemGlow)"/>
</svg>
